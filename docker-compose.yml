services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - pixelreforge-runtime:/app/runtime

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pixelreforge-runtime:
